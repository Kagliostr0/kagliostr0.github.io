<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Preview Cursors PNG</title>
  <style>
    body { background: #0a0a0a; padding: 20px; font-family: monospace; }
    .preview { display: flex; gap: 40px; margin-bottom: 30px; }
    .item { text-align: center; }
    .item img { width: 128px; height: 128px; border: 2px solid #00ff00; padding: 10px; background: #111; }
    .item p { color: #00ff00; margin-top: 10px; }
    .demo { width: 100%; height: 200px; border: 2px solid #00ff00; display: flex; align-items: center; justify-content: center; }
    .demo p { color: #00ff00; }
    h1 { color: #00ff00; }
    .with-dragon { cursor: url('dragon-cursor.png'), default; }
  </style>
</head>
<body>
  <h1>CURSORES PNG</h1>
  <div class="preview">
    <div class="item">
      <img src="dragon-cursor.png" alt="Dragon">
      <p>DRAGON</p>
    </div>
    <div class="item">
      <img src="skull-cursor.png" alt="Skull">
      <p>SKULL</p>
    </div>
  </div>
  <div class="demo with-dragon">
    <p>PASÁ EL MOUSE ACÁ - deberías ver el DRAGÓN</p>
  </div>
</body>
</html>
